<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skrunch Aim Training</title>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Hits: <span id="hits">0</span></div>
        <div>Shots: <span id="shots">0</span></div>
        <div>Time: <span id="time">30</span></div>
      </div>

      <div id="crosshair"></div>

      <div id="menu">
        <div id="menu-card">
          <h1>Skrunch Aim Training</h1>

          <p>Adjust your settings</p>

          <label>Sensitivity:</label><br />
          <input id="sens-input" type="number" step="0.1" value="2.5" />

          <br /><br />

          <button id="start-btn">Start</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
